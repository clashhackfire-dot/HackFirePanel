<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HackFire's Panel — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070c;
    --bg-card: rgba(15, 22, 34, 0.65);
    --sky: #38bdf8;
    --sky-deep: #0ea5e9;
    --sky-pale: #7dd3fc;
    --text: #eaf3fb;
    --muted: #8695a8;
    --border: rgba(56, 189, 248, 0.18);
    --danger: #f87171;
    --good: #4ade80;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 16px 80px;
    background: var(--bg);
    color: var(--text);
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    width: 60vmax;
    height: 60vmax;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.14;
    z-index: -2;
    pointer-events: none;
  }
  body::before { top: -22vmax; left: -22vmax; background: radial-gradient(circle, var(--sky), transparent 70%); }
  body::after { bottom: -26vmax; right: -22vmax; background: radial-gradient(circle, var(--sky-deep), transparent 70%); }

  #particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%; background: var(--sky-pale);
    box-shadow: 0 0 8px 2px rgba(125, 211, 252, 0.5);
    animation: drift ease-in-out infinite;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0); opacity: 0; }
    15%  { opacity: 0.6; }
    50%  { transform: translate(var(--driftx, 12px), var(--drifty, -40px)); opacity: 0.8; }
    85%  { opacity: 0.3; }
    100% { transform: translate(0, -90px); opacity: 0; }
  }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .brand { display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.25rem; }
  .orb {
    width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, var(--sky) 40%, var(--sky-deep) 80%);
    box-shadow: 0 0 12px 3px rgba(56, 189, 248, 0.55);
    animation: breathe 3.6s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 12px 3px rgba(56,189,248,0.45); }
    50% { transform: scale(1.25); box-shadow: 0 0 18px 5px rgba(56,189,248,0.7); }
  }
  .brand-text { background: linear-gradient(90deg, var(--sky-pale), var(--sky), var(--sky-deep)); -webkit-background-clip: text; background-clip: text; color: transparent; background-size: 200% auto; animation: shimmer 7s ease-in-out infinite; }
  @keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 100% center; } }

  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
    color: var(--good); background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
    padding: 5px 10px; border-radius: 999px;
  }
  .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--good); animation: breathe 2s ease-in-out infinite; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 22px; }
  .stat {
    background: var(--bg-card); backdrop-filter: blur(14px); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 10px; text-align: center;
  }
  .stat .num { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--sky-pale); }
  .stat .label { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  .card {
    background: var(--bg-card); backdrop-filter: blur(14px); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-bottom: 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .card h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; margin: 0 0 14px; display: flex; justify-content: space-between; align-items: center; }

  .add-btn {
    background: linear-gradient(90deg, var(--sky-deep), var(--sky)); color: #04121c;
    border: none; padding: 7px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }

  .user-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .user-row:last-child { border-bottom: none; }
  .avatar {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--sky), var(--sky-deep));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #04121c; font-size: 0.9rem;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 0.9rem; font-weight: 600; }
  .user-meta { font-size: 0.72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .quota-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-top: 6px; overflow: hidden; }
  .quota-fill { height: 100%; background: linear-gradient(90deg, var(--sky), var(--sky-deep)); border-radius: 2px; }

  .toggle {
    width: 36px; height: 20px; border-radius: 999px; background: rgba(255,255,255,0.12);
    position: relative; cursor: pointer; border: none; flex-shrink: 0; transition: background 0.25s;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%;
    background: #cbd5e1; transition: transform 0.25s, background 0.25s;
  }
  .toggle.on { background: rgba(56,189,248,0.35); }
  .toggle.on::after { transform: translateX(16px); background: var(--sky-pale); }

  .icon-btn {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--muted); font-size: 0.85rem;
    cursor: pointer; flex-shrink: 0;
  }
  .icon-btn:hover { color: var(--sky-pale); border-color: rgba(56,189,248,0.4); }

  .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 18px 0; }

  footer { text-align: center; color: var(--muted); font-size: 0.7rem; margin-top: 30px; font-family: 'JetBrains Mono', monospace; line-height: 1.6; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <div id="particles"></div>

  <header>
    <div class="brand"><span class="orb"></span><span class="brand-text">HackFire's Panel</span></div>
    <span class="status-pill">online</span>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="statUsers">–</div><div class="label">Active users</div></div>
    <div class="stat"><div class="num" id="statTraffic">–</div><div class="label">Traffic today</div></div>
    <div class="stat"><div class="num" id="statUptime">–</div><div class="label">Uptime</div></div>
  </div>

  <div class="card">
    <h2>Users <button class="add-btn" id="addUserBtn">+ Add</button></h2>
    <div id="userList"></div>
  </div>

  <footer>
    Live data requires the KV-backed users API on the main worker.<br>
    Showing placeholder data until that's wired up.
  </footer>

  <script>
    const particleField = document.getElementById('particles');
    const particleCount = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 14;
    for (let i = 0; i < particleCount; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = 2 + Math.random() * 3;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = Math.random() * 100 + 'vh';
      el.style.setProperty('--driftx', (Math.random() * 40 - 20) + 'px');
      el.style.setProperty('--drifty', (Math.random() * -60 - 20) + 'px');
      el.style.animationDuration = (10 + Math.random() * 10) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      particleField.appendChild(el);
    }

    // Placeholder data — replace with a fetch() to your worker's users API
    // once the KV-backed multi-user endpoints exist.
    const placeholderUsers = [
      { name: 'primary', uuid: '4e1c...9af2', usedGB: 3.2, quotaGB: 10, active: true },
      { name: 'guest-1', uuid: '9b7a...11d0', usedGB: 8.7, quotaGB: 10, active: true },
      { name: 'backup', uuid: '2f44...7c3e', usedGB: 0.4, quotaGB: 5, active: false },
    ];

    document.getElementById('statUsers').textContent = placeholderUsers.filter(u => u.active).length;
    document.getElementById('statTraffic').textContent =
      placeholderUsers.reduce((s, u) => s + u.usedGB, 0).toFixed(1) + ' GB';
    document.getElementById('statUptime').textContent = '99.9%';

    const userList = document.getElementById('userList');

    function render() {
      userList.innerHTML = '';
      if (!placeholderUsers.length) {
        userList.innerHTML = '<div class="empty">No users yet — add one to get started.</div>';
        return;
      }
      placeholderUsers.forEach((u, i) => {
        const pct = Math.min(100, (u.usedGB / u.quotaGB) * 100);
        const row = document.createElement('div');
        row.className = 'user-row';
        row.innerHTML = `
          <div class="avatar">${u.name.slice(0,2).toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${u.name}</div>
            <div class="user-meta">${u.uuid} · ${u.usedGB}/${u.quotaGB} GB</div>
            <div class="quota-bar"><div class="quota-fill" style="width:${pct}%"></div></div>
          </div>
          <button class="toggle ${u.active ? 'on' : ''}" data-i="${i}" title="Toggle access"></button>
          <button class="icon-btn" data-copy="${i}" title="Copy subscription link">⧉</button>
        `;
        userList.appendChild(row);
      });
    }
    render();

    userList.addEventListener('click', (e) => {
      if (e.target.classList.contains('toggle')) {
        const i = +e.target.dataset.i;
        placeholderUsers[i].active = !placeholderUsers[i].active;
        render();
      }
      if (e.target.dataset.copy !== undefined) {
        const u = placeholderUsers[+e.target.dataset.copy];
        navigator.clipboard.writeText(`vless://${u.uuid}@example.workers.dev:443?encryption=none&security=tls&type=ws#${u.name}`);
        e.target.textContent = '✓';
        setTimeout(() => { e.target.textContent = '⧉'; }, 1200);
      }
    });

    document.getElementById('addUserBtn').addEventListener('click', () => {
      const name = prompt('User label (e.g. "guest-2"):');
      if (!name) return;
      placeholderUsers.push({ name, uuid: crypto.randomUUID().slice(0,4)+'...'+crypto.randomUUID().slice(0,4), usedGB: 0, quotaGB: 10, active: true });
      render();
    });
  </script>
</body>
</html>
